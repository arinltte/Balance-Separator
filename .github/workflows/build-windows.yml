name: Build Windows Executable

# This workflow will trigger whenever you create a Release Tag (e.g., v0.2.0)
# or you can trigger it manually from the GitHub Actions tab.
on:
  push:
    tags:
      - 'v*' 
  workflow_dispatch: 

# We need write permissions to automatically upload the .exe to the GitHub Release
permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11' # Best stable version for PyInstaller compilation

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Build Executable with PyInstaller
      # Using 'cmd' shell to perfectly match your .bat file line continuations (^)
      shell: cmd
      run: |
        pyinstaller --noconfirm --windowed --onefile --clean ^
          --name "Balance Separator" ^
          --icon="assets/BS_logo.ico" ^
          --add-data "assets;assets" ^
          --collect-submodules PyQt6 ^
          --hidden-import PyQt6.sip ^
          --hidden-import pandas ^
          --hidden-import openpyxl ^
          --hidden-import numpy ^
          --hidden-import cryptography ^
          --hidden-import cryptography.fernet ^
          --hidden-import cryptography.hazmat ^
          --hidden-import cryptography.hazmat.primitives ^
          --hidden-import cryptography.hazmat.primitives.kdf.pbkdf2 ^
          --hidden-import cryptography.hazmat.primitives.hashes ^
          --hidden-import cryptography.hazmat.backends ^
          --hidden-import requests ^
          --hidden-import requests.adapters ^
          --hidden-import urllib3 ^
          --hidden-import pytz ^
          main.py

    - name: Upload Artifact (For Testing)
      uses: actions/upload-artifact@v4
      with:
        name: Balance-Separator-Windows
        path: "dist/Balance Separator.exe"

    - name: Upload to GitHub Release
      # Only run this step if the workflow was triggered by a tag (e.g. v0.2.0)
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v2
      with:
        files: "dist/Balance Separator.exe"
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
